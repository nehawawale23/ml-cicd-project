name: ML CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  train-and-test:
    name: "Train & Test"
    runs-on: ubuntu-latest
    steps:
      - name: Get the code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install libraries
        run: pip install -r app/requirements.txt

      - name: Train the model
        run: python app/model.py

      - name: Run tests
        run: pytest tests/ -v

  build-docker:
    name: "Build Docker"
    runs-on: ubuntu-latest
    needs: train-and-test
    steps:
      - name: Get the code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: docker build -t ml-model:latest .

      - name: Test the container
        run: |
          docker run -d -p 5000:5000 --name ml-test ml-model:latest
          sleep 5
          curl --fail http://localhost:5000/health
          echo "Container is healthy!"
          docker stop ml-test

  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Get the code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        run: |
          docker build -t nehawawale23/ml-model:latest .
          docker push nehawawale23/ml-model:latest
          echo "Successfully deployed!"